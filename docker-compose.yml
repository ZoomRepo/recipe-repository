services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: recipe-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - recipe-stack
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u elastic:${ELASTICSEARCH_PASSWORD:-changeme} http://localhost:9200/_cluster/health >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  recipe-stack:
    name: recipe-stack
